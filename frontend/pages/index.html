<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Canteen – Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-circle">🍛</div>
      <h2>Smart Canteen</h2>
      <p>VIT Chennai · Your canteen, smarter!</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login', this)">Login</button>
      <button class="auth-tab" onclick="showTab('register', this)">Register</button>
    </div>

    <!-- Login Form -->
    <div id="login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@vit.ac.in" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="login()">Login →</button>
      <p id="loginMsg" style="margin-top:10px;font-size:0.85rem;font-weight:600"></p>
    </div>

    <!-- Register Form -->
    <div id="register" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Shruthi Subramanian" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@vit.ac.in" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="regRole">
          <option value="student">🎓 Student</option>
          <option value="admin">👨‍💼 Admin</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full btn-lg" onclick="register()">Register →</button>
      <p id="registerMsg" style="margin-top:10px;font-size:0.85rem;font-weight:600"></p>
    </div>

    <p style="margin-top:1.5rem;font-size:0.78rem;color:var(--text-light);text-align:center">
      VIT Chennai | Smart Canteen System 2026
    </p>

  </div>
</div>

<script>
  const API = 'http://localhost:3000';

  function showTab(tab, btn) {
    document.getElementById('login').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
  }

  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const msg      = document.getElementById('loginMsg');

    if (!email || !password) {
      msg.style.color = 'var(--red)';
      msg.textContent = '❌ Please fill in all fields!';
      return;
    }

    msg.style.color = 'var(--teal)';
    msg.textContent = 'Logging in...';

    try {
      const res  = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'menu.html';
      } else {
        msg.style.color = 'var(--red)';
        msg.textContent = '❌ ' + data.message;
      }
    } catch (err) {
      msg.style.color = 'var(--red)';
      msg.textContent = '❌ Cannot reach server. Is it running?';
    }
  }

  async function register() {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const role     = document.getElementById('regRole').value;
    const msg      = document.getElementById('registerMsg');

    if (!name || !email || !password) {
      msg.style.color = 'var(--red)';
      msg.textContent = '❌ Please fill in all fields!';
      return;
    }

    msg.style.color = 'var(--teal)';
    msg.textContent = 'Registering...';

    try {
      const res  = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();

      if (res.ok) {
        msg.style.color = 'var(--green)';
        msg.textContent = '✅ Registered! Please login now.';
        setTimeout(() => showTab('login', document.querySelector('.auth-tab')), 1500);
      } else {
        msg.style.color = 'var(--red)';
        msg.textContent = '❌ ' + data.message;
      }
    } catch (err) {
      msg.style.color = 'var(--red)';
      msg.textContent = '❌ Cannot reach server. Is it running?';
    }
  }
</script>

</body>
</html>
